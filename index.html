<!DOCTYPE html>
<html>
<head>
    <title>orcaSaaS · 跨國 AIoT 平台</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a2f1f 0%, #051a0e 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        .whale {
            position: absolute;
            font-size: 5rem;
            bottom: 0;
            right: 0;
            transform: translate(0, 0);
            transition: all 3s ease-in-out;
            z-index: 10;
            cursor: pointer;
        }
        .bio-whale {
            position: absolute;
            font-size: 5rem;
            opacity: 0;
            transition: 1s;
            z-index: 10;
        }
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: 1s;
            z-index: 20;
        }
        .logo h1 {
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 2px 2px 0 #8B0000;
        }
        .logo p {
            color: #D4AF37;
            font-size: 1rem;
        }
        .auth-container {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            border: 1px solid #D4AF37;
            opacity: 0;
            transition: 1s;
            z-index: 20;
        }
        .lang-bar { text-align: right; margin-bottom: 15px; }
        select { background: #D4AF37; border-radius: 20px; padding: 5px 10px; border: none; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 30px; border: none; }
        button { background: #D4AF37; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 8px; background: rgba(255,215,0,0.2); border-radius: 30px; cursor: pointer; }
        .tab.active { background: #D4AF37; color: #0a2f1f; }
        .form-pane { display: none; }
        .form-pane.active { display: block; }
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #D4AF37;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="whale" id="whale">🐋</div>
    <div class="bio-whale" id="bioWhale">🐋⚡</div>
    <div class="logo" id="logo">
        <h1>🐋 orcaSaaS</h1>
        <p>跨國 AIoT 平台 · 多租戶 · 多語系 · 即時警報</p>
    </div>
    <div class="auth-container" id="authContainer">
        <div class="lang-bar">
            <select id="langSelect">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="ja">日本語</option>
                <option value="fr">Français</option>
                <option value="ru">Русский</option>
            </select>
        </div>
        <div class="tabs">
            <div class="tab active" data-tab="login">🔐 登入</div>
            <div class="tab" data-tab="register">📝 註冊</div>
        </div>
        <div id="loginPane" class="form-pane active">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="密碼">
            <button id="doLogin">登入</button>
        </div>
        <div id="registerPane" class="form-pane">
            <input type="text" id="regName" placeholder="公司名稱">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="密碼">
            <button id="doRegister">註冊</button>
        </div>
    </div>
    <div class="footer">⚜️ orcaSaaS · 跨國 AIoT 平台 ⚜️</div>

    <script>
        const whale = document.getElementById('whale');
        const bioWhale = document.getElementById('bioWhale');
        const logo = document.getElementById('logo');
        const authContainer = document.getElementById('authContainer');

        // 動畫序列
        whale.style.transition = 'all 3s ease-in-out';
        
        setTimeout(() => {
            // 游到左中
            whale.style.transform = 'translate(-300px, -200px)';
        }, 500);
        
        setTimeout(() => {
            // 往右上游
            whale.style.transform = 'translate(100px, -400px)';
        }, 2000);
        
        setTimeout(() => {
            // 變身生化人
            whale.style.opacity = '0';
            bioWhale.style.opacity = '1';
            bioWhale.style.transform = 'translate(150px, -450px)';
        }, 3500);
        
        setTimeout(() => {
            // 消失，顯示 Logo
            bioWhale.style.opacity = '0';
            logo.style.opacity = '1';
            authContainer.style.opacity = '1';
        }, 4800);
    </script>
</body>
</html>
